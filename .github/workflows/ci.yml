name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    name: Lint, type-check & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm tsc

      - name: Test
        run: pnpm test
